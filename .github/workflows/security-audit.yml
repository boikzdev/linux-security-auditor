name:
Linux Security Audit


on:

 push:

 pull_request:



jobs:


 security:


  runs-on:
   ubuntu-latest



  steps:


   - name:
     Checkout


     uses:
      actions/checkout@v4



   - name:
     Python Setup


     uses:
      actions/setup-python@v5


     with:


      python-version:
       "3.12"



   - name:
     Install dependencies


     run:


      pip install -r requirements.txt



   - name:
     Run analyzer tests


     run:


      pytest tests/



   - name:
     Execute audit


     run:


      bash scripts/audit.sh --all
